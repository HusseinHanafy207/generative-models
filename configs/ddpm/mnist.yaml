# Dataset (images stay in [0, 1] — same as VAE for the first correct version)
dataset: MNIST
data_dir: data/raw

# Training
batch_size: 64
epochs: 20
learning_rate: 0.0002
optimizer: Adam

# Diffusion schedule (Ho et al., 2020)
num_timesteps: 1000
beta_start: 0.0001
beta_end: 0.02

# U-Net (MNIST-sized)
base_channels: 64
channel_mult: [1, 2, 4]
num_res_blocks: 2
attention_resolutions: [7]
dropout: 0.1

# Device
device: auto

# Saving
checkpoint_dir: outputs/ddpm/checkpoints
sample_dir: outputs/ddpm/samples
log_dir: outputs/ddpm/logs
train_metrics_file: train_metrics.csv
val_metrics_file: val_metrics.csv
# Keep latest.pt every epoch; also write epoch_005.pt, epoch_010.pt, ...
checkpoint_every: 5

# Randomness
seed: 42
